[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "sizer-api"
version = "0.1.0"
description = "HTTP layer over sizer-engine: auth, audit, account state, versioning."
requires-python = ">=3.11"
dependencies = ["sizer-engine", "fastapi>=0.100", "uvicorn>=0.23"]

[project.optional-dependencies]
test = ["pytest>=7", "httpx>=0.24"]

[tool.setuptools.packages.find]
include = ["sizer_api*"]
